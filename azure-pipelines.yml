trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: UseDotNet@2
  inputs:
    version: '8.x'

- script: |
    cd backend/CiCdDemo.Api
    dotnet restore
    dotnet build
  displayName: Build API

- task: NodeTool@0
  inputs:
    versionSpec: '18.x'

- script: |
    cd frontend
    npm install
    npm run build
  displayName: Build React